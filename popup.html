<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Browsign</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;1,9..144,300&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --ink: #1a1209;
      --cream: #f5f0e8;
      --amber: #d4820a;
      --amber-light: #f0a830;
      --sage: #5a7a5a;
      --rust: #c0441a;
      --paper: #faf7f2;
      --border: #d4c9b0;
    }

    body {
      width: 320px;
      background: var(--paper);
      font-family: 'DM Mono', monospace;
      color: var(--ink);
      border: 2px solid var(--ink);
    }

    .header {
      background: var(--ink);
      color: var(--cream);
      padding: 16px 20px 14px;
      position: relative;
      overflow: hidden;
    }

    .header::before {
      content: '';
      position: absolute;
      top: -20px; right: -20px;
      width: 80px; height: 80px;
      border: 2px solid var(--amber);
      border-radius: 50%;
      opacity: 0.3;
    }

    .header-top {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 4px;
    }

    .logo {
      width: 28px; height: 28px;
      background: var(--amber);
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
    }

    .app-name {
      font-family: 'Fraunces', serif;
      font-size: 18px;
      font-weight: 600;
      letter-spacing: -0.5px;
      color: var(--cream);
    }

    .tagline {
      font-size: 10px;
      color: #8a7f6e;
      letter-spacing: 0.05em;
      margin-left: 38px;
    }

    .section {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
    }

    .section-label {
      font-size: 9px;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #8a7f6e;
      margin-bottom: 10px;
    }

    .upload-zone {
      border: 2px dashed var(--border);
      border-radius: 6px;
      padding: 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      background: var(--cream);
      position: relative;
    }

    .upload-zone:hover {
      border-color: var(--amber);
      background: #fdf6e8;
    }

    .upload-zone.drag-over {
      border-color: var(--amber);
      background: #fdf6e8;
      transform: scale(1.01);
    }

    .upload-icon {
      font-size: 28px;
      margin-bottom: 8px;
      display: block;
    }

    .upload-text {
      font-size: 11px;
      color: #6a5f50;
      line-height: 1.5;
    }

    .upload-text strong {
      color: var(--amber);
      font-weight: 500;
    }

    #fileInput {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
    }

    .url-row {
      display: flex;
      gap: 6px;
      margin-top: 10px;
    }

    .url-input {
      flex: 1;
      padding: 8px 10px;
      border: 1px solid var(--border);
      border-radius: 4px;
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      background: var(--cream);
      color: var(--ink);
      outline: none;
      transition: border-color 0.2s;
    }

    .url-input:focus {
      border-color: var(--amber);
    }

    .url-input::placeholder {
      color: #b0a090;
    }

    .btn {
      padding: 8px 12px;
      border: none;
      border-radius: 4px;
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      letter-spacing: 0.03em;
    }

    .btn-primary {
      background: var(--ink);
      color: var(--cream);
    }

    .btn-primary:hover {
      background: #2d2015;
    }

    .btn-amber {
      background: var(--amber);
      color: white;
    }

    .btn-amber:hover {
      background: #b8700a;
    }

    .recent-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .recent-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      border: 1px solid var(--border);
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.15s;
      background: var(--cream);
    }

    .recent-item:hover {
      border-color: var(--amber);
      background: #fdf6e8;
    }

    .recent-icon {
      font-size: 16px;
      flex-shrink: 0;
    }

    .recent-info {
      flex: 1;
      min-width: 0;
    }

    .recent-name {
      font-size: 11px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--ink);
    }

    .recent-date {
      font-size: 9px;
      color: #8a7f6e;
      margin-top: 1px;
    }

    .recent-arrow {
      font-size: 12px;
      color: var(--amber);
      flex-shrink: 0;
    }

    .empty-state {
      text-align: center;
      padding: 12px;
      color: #b0a090;
      font-size: 10px;
    }

    .current-tab-section {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 20px;
      background: #f0ece4;
      border-bottom: 1px solid var(--border);
    }

    .tab-badge {
      font-size: 9px;
      background: var(--sage);
      color: white;
      padding: 2px 6px;
      border-radius: 2px;
      letter-spacing: 0.08em;
      white-space: nowrap;
    }

    .tab-info {
      flex: 1;
      min-width: 0;
    }

    .tab-label {
      font-size: 9px;
      color: #8a7f6e;
      margin-bottom: 1px;
    }

    .tab-name {
      font-size: 10px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .btn-open-tab {
      background: var(--sage);
      color: white;
      font-size: 9px;
      padding: 6px 10px;
      white-space: nowrap;
    }

    .btn-open-tab:hover {
      background: #4a6a4a;
    }

    .footer {
      padding: 10px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .footer-text {
      font-size: 9px;
      color: #b0a090;
    }

    .footer-link {
      font-size: 9px;
      color: var(--amber);
      text-decoration: none;
      cursor: pointer;
    }

    .footer-link:hover {
      text-decoration: underline;
    }

    .status-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--sage);
      display: inline-block;
      margin-right: 4px;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .hidden { display: none !important; }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-top">
      <div class="logo">✍</div>
      <span class="app-name">Browsign</span>
    </div>
    <div class="tagline">fill forms · add signatures · download</div>
  </div>

  <!-- Current Tab (shown if tab has PDF) -->
  <div class="current-tab-section hidden" id="tabPdfSection">
    <span class="tab-badge">PDF DETECTED</span>
    <div class="tab-info">
      <div class="tab-label">current tab</div>
      <div class="tab-name" id="tabPdfName">document.pdf</div>
    </div>
    <button class="btn btn-open-tab" id="openTabPdf">Open Editor</button>
  </div>

  <!-- Upload Section -->
  <div class="section">
    <div class="section-label">Open a PDF</div>

    <div class="upload-zone" id="uploadZone">
      <input type="file" accept=".pdf" id="fileInput">
      <span class="upload-icon">📄</span>
      <div class="upload-text">
        <strong>Click or drag</strong> a PDF here<br>
        to start editing
      </div>
    </div>

    <div class="url-row">
      <input type="text" class="url-input" id="urlInput" placeholder="Paste PDF URL…">
      <button class="btn btn-primary" id="loadUrl">Load</button>
    </div>
  </div>

  <!-- Recent Files -->
  <div class="section" id="recentSection">
    <div class="section-label">Recent</div>
    <div class="recent-list" id="recentList">
      <div class="empty-state">No recent files</div>
    </div>
  </div>

  <div class="footer">
    <span class="footer-text"><span class="status-dot"></span>ready</span>
    <span class="footer-link" id="clearRecent">clear history</span>
  </div>

  <script src="popup.js"></script>
</body>
</html>
